name: Deploy Docker NGIX Web Server Image to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: medici_erc_prod 
          IMAGE_TAG: latest
        run: |
          docker build -t $REPOSITORY .
          docker tag $REPOSITORY:latest $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

  manual-approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    permissions:
      issues: write

    steps:
      - name: await manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: percymohale
          minimum-approvers: 1
          issue-tittle: "Manual Approval for AWS Deployment"
          issue-body: "Please approve to allow AWS Deployment"

  deploy:
    needs: manual-approval
    runs-on: ubuntu-latest
    steps:
      - name: Pull and run the latest image on EC2
        uses: appleboy/ssh-action@v0.1.3 # A marketplace action for SSH
        with:
          host: ${{ secrets.EC2_HOST }} # EC2 public IP stored as a secret
          username: ec2-user # Or 'ubuntu' depending on AMI
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Set AWS credentials on the EC2 instance for ECR login
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}

            # Login to ECR on the EC2 instance (requires ECR permissions on EC2 IAM role)
            aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 471112967520.dkr.ecr.eu-west-1.amazonaws.com/medici_erc_prod
            
            # Pull the latest image
            docker pull 471112967520.dkr.ecr.eu-west-1.amazonaws.com/medici_erc_prod:latest
            
            # Stop and remove the old container
            docker stop medici_web_server || true
            docker rm medici_web_server || true
            
            # Run a new container
            docker run -d --name medici_web_server -p 80:80 471112967520.dkr.ecr.eu-west-1.amazonaws.com/medici_erc_prod:latest
